<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>漫画ビューワー</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

    <style>
        :root {
            /* 広告を避けるための下部余白（広告の高さに合わせて調整してください） */
            --ad-safe-bottom: 0px; 
        }

        body { 
            background-color: #111; 
            color: #fff; 
            margin: 0; 
            padding: 0; 
            overflow: hidden;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* ビューワー全体のサイズ設定 */
        .comic-viewer-wrapper {
            width: 100%;
            height: calc(100vh - var(--ad-safe-bottom));
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .comic-viewer { 
            width: 100%; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        .comic-viewer img { 
            width: 100%; 
            height: auto; 
            max-height: calc(100vh - var(--ad-safe-bottom));
            object-fit: contain;
            display: block; 
        }

        /* 左右・中央のタップ判定エリア */
        .tap-zone {
            position: fixed;
            top: 60px;
            bottom: calc(0px + var(--ad-safe-bottom));
            z-index: 10;
        }
        .tap-left { left: 0; width: 25%; }
        .tap-right { right: 0; width: 25%; }
        .tap-center { left: 25%; width: 50%; }

        /* ジャンププラス風メニュー（上下のバー）共通設定 */
        .menu-bar {
            position: fixed;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 20, 0.95);
            transition: transform 0.2s ease;
            z-index: 100;
            box-sizing: border-box;
        }
        /* 初期状態は画面の外に隠しておく */
        .top-bar {
            top: 0;
            height: 60px;
            transform: translateY(-100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #333;
        }
        .bottom-bar {
            bottom: var(--ad-safe-bottom);
            height: 100px;
            transform: translateY(calc(100% + var(--ad-safe-bottom)));
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px 20px;
            border-top: 1px solid #333;
        }
        /* メニュー表示用のクラス */
        .menu-active {
            transform: translateY(0) !important;
        }

        /* ボタン・テキストのデザイン */
        .top-title {
            font-size: 16px;
            font-weight: bold;
        }
        .back-to-top {
            position: absolute;
            left: 15px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            background: #333;
            padding: 6px 12px;
            border-radius: 4px;
        }

        /* ページ数表示（〇/〇） */
        .page-counter {
            text-align: center;
            font-size: 14px;
            color: #ccc;
        }

        /* ゲージ（スライダーバー） */
        .gauge-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 5px 0;
        }
        .page-gauge {
            width: 85%;
            margin: 0;
            cursor: pointer;
            accent-color: #e50914; /* ジャンプ風の赤色ゲージ */
        }

        /* 下部ナビゲーション（【修正】次の話を左、前の話を右に強制配置） */
        .story-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
        }
        .story-nav a {
            color: #fff;
            text-decoration: none;
            background: #222;
            padding: 5px 15px;
            border-radius: 4px;
            border: 1px solid #444;
        }
        .story-nav a.disabled {
            color: #555;
            border-color: #222;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="tap-zone tap-left" id="zone-left"></div>
    <div class="tap-zone tap-center" id="zone-center"></div>
    <div class="tap-zone tap-right" id="zone-right"></div>

    <div class="menu-bar top-bar" id="top-bar">
        <a href="index.html" class="back-to-top">◀ TOPへ戻る</a>
        <div class="top-title" id="menu-title">第1話</div>
    </div>

    <div class="comic-viewer-wrapper">
        <div class="comic-viewer" id="viewer" dir="rtl"></div>
    </div>

    <div class="menu-bar bottom-bar" id="bottom-bar">
        <div class="page-counter"><span id="current-page">1</span> / <span id="total-page">54</span></div>
        
        <div class="gauge-container">
            <input type="range" id="page-gauge" class="page-gauge" dir="rtl" min="1" max="54" value="1" step="1">
        </div>

        <div class="story-nav">
            <a href="#" id="link-next">◀ 次の話</a>
            <a href="#" id="link-prev">前の話 ▶</a>
        </div>
    </div>

    <script>
        // ① URLから現在の話数を取得
        const urlParams = new URLSearchParams(window.location.search);
        const storyFolder = urlParams.get('p') || 'story1';

        const storyNum = storyFolder.replace('story', '');
        document.getElementById('menu-title').innerText = `第${storyNum}話`;

        // ② 各話の総ページ数の設定
        const pageCounts = {
            'story1': 54, 
            'story2': 22,  
            'story3': 34,  
            'story4': 44,  
            'story5': 48,  
            'story6': 50,  
            'story7': 26,  
            'story8': 30,  
        };
        const totalPages = pageCounts[storyFolder] || 54;

        document.getElementById('total-page').innerText = totalPages;
        const gauge = document.getElementById('page-gauge');
        gauge.max = totalPages;

        // ③ 前後の話のリンクURLを自動セット
        const currentNum = parseInt(storyNum, 10);
        const prevLink = document.getElementById('link-prev');
        const nextLink = document.getElementById('link-next');

        if (currentNum > 1) {
            prevLink.href = `?p=story${currentNum - 1}`;
        } else {
            prevLink.classList.add('disabled');
        }

        if (pageCounts[`story${currentNum + 1}`]) {
            nextLink.href = `?p=story${currentNum + 1}`;
        } else {
            nextLink.classList.add('disabled');
        }

// ④ 画像URL of GitHub Pages（エラー回避・高速化）
        const githubBase = `https://kizukusan.github.io/moimon/${storyFolder}/`;
        const viewer = document.getElementById('viewer');
        for (let i = 1; i <= totalPages; i++) {
            const pageNum = String(i).padStart(2, '0');
            const img = document.createElement('img');
            img.src = `${githubBase}${pageNum}.jpg`; // ← ?raw=true も不要になります
            viewer.appendChild(img);
        }

        // ⑤ ビューワー（slick）の起動と連動設定
        $(document).ready(function(){
            const $viewer = $('#viewer');
            let isDragging = false;
            
            $viewer.slick({
                rtl: true,
                infinite: false,
                slidesToShow: 1,
                slidesToScroll: 1,
                arrows: false,
                swipe: true,
                touchMove: true
            });

            // ページがめくられたらスライダーとページ表示を同期
            $viewer.on('afterChange', function(event, slick, currentSlide){
                const actualPage = currentSlide + 1; 
                document.getElementById('current-page').innerText = actualPage;
                // スライダー操作中でない場合のみ、つまみの位置を同期
                if (!isDragging) {
                    gauge.value = actualPage;
                }
            });

            // スライダー操作開始
            $(gauge).on('mousedown touchstart', function() {
                isDragging = true;
            });

            // スライダーを動かしている最中の処理（数値のリアルタイム表示更新のみ）
            $(gauge).on('input', function(){
                const targetPage = parseInt($(this).val(), 10);
                document.getElementById('current-page').innerText = targetPage;
            });

            // スライダー操作終了（ドラッグを離した、またはクリックした瞬間にジャンプ）
            $(gauge).on('change mouseup touchend', function(){
                if (isDragging) {
                    isDragging = false;
                    const targetPage = parseInt($(this).val(), 10);
                    document.getElementById('current-page').innerText = targetPage;
                    $viewer.slick('slickGoTo', targetPage - 1, true); // アニメーションなしで即座に移動
                }
            });

            // 画面タップ操作の割り当て（右端タップで進む、左端タップで戻る）
            $('#zone-right').on('click', function(){
                $viewer.slick('slickPrev'); 
            });

            $('#zone-left').on('click', function(){
                $viewer.slick('slickNext'); 
            });

            // 中央タップ（メニューの出現・格納）
            $('#zone-center').on('click', function(){
                $('#top-bar').toggleClass('menu-active');
                $('#bottom-bar').toggleClass('menu-active');
            });

            // 自動的にメニューを閉じる（スライダー操作中以外のみ実行）
            $viewer.on('beforeChange', function(){
                if (!isDragging) {
                    $('#top-bar').removeClass('menu-active');
                    $('#bottom-bar').removeClass('menu-active');
                }
            });
        });
    </script>

</body>
</html>
