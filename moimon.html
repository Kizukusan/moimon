<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>漫画ビューワー</title>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.css"/>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/slick-carousel@1.8.1/slick/slick.min.js"></script>

    <style>
        :root {
            /* 広告を避けるための下部余白 */
            --ad-safe-bottom: 0px; 
        }

        body { 
            background-color: #111; 
            color: #fff; 
            margin: 0; 
            padding: 0; 
            overflow: hidden;
            font-family: sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        
        /* ビューワー全体のサイズ設定 */
        .comic-viewer-wrapper {
            width: 100%;
            height: calc(100dvh - var(--ad-safe-bottom));
            display: flex;
            align-items: center;
            justify-content: center;
            box-sizing: border-box;
        }
        .comic-viewer { 
            width: 100%; 
            max-width: 800px; 
            margin: 0 auto; 
        }
        .comic-viewer img { 
            width: 100%; 
            height: auto; 
            max-height: calc(100dvh - var(--ad-safe-bottom));
            object-fit: contain;
            display: block; 
        }

        /* 横画面時のみビューワーの最大幅制限を解除し全画面表示にする */
        @media (orientation: landscape) {
            .comic-viewer {
                max-width: none;
                width: 100%;
                height: calc(100dvh - var(--ad-safe-bottom));
            }
        }

        .comic-viewer .slick-track {
            display: flex !important;
            height: 100% !important;
        }
        .comic-viewer .slick-slide {
            height: 100% !important;
            display: flex !important;
            justify-content: center;
            align-items: center;
        }

        /* 見開きスライド用コンテナ */
        .slide-spread {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            width: 100vw;
            height: calc(100dvh - var(--ad-safe-bottom));
            box-sizing: border-box;
        }

        .page-container {
            height: 100%;
            max-height: calc(100dvh - var(--ad-safe-bottom));
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #111;
            font-size: 0;
            line-height: 0;
            box-sizing: border-box;
        }
        .page-container img {
            display: block;
            width: auto;
            height: auto;
            max-width: 50vw;
            max-height: calc(100dvh - var(--ad-safe-bottom));
            object-fit: contain;
        }

        /* 左右・中央のタップ判定エリア */
        .tap-zone {
            position: fixed;
            top: 60px;
            bottom: calc(0px + var(--ad-safe-bottom));
            z-index: 10;
        }
        .tap-left { left: 0; width: 25%; }
        .tap-right { right: 0; width: 25%; }
        .tap-center { left: 25%; width: 50%; }

        /* ジャンププラス風メニュー（上下のバー）共通設定 */
        .menu-bar {
            position: fixed;
            left: 0;
            width: 100%;
            background: rgba(20, 20, 20, 0.95);
            transition: transform 0.2s ease;
            z-index: 100;
            box-sizing: border-box;
        }
        .top-bar {
            top: 0;
            height: 60px;
            transform: translateY(-100%);
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 1px solid #333;
        }
        .bottom-bar {
            bottom: var(--ad-safe-bottom);
            height: 110px; /* ボタン追加に伴い少しだけ高さを調整 */
            transform: translateY(calc(100% + var(--ad-safe-bottom)));
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            padding: 10px 20px;
            border-top: 1px solid #333;
        }
        .menu-active {
            transform: translateY(0) !important;
        }

        .top-title {
            font-size: 16px;
            font-weight: bold;
        }
        .back-to-top {
            position: absolute;
            left: 15px;
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            background: #333;
            padding: 6px 12px;
            border-radius: 4px;
        }

        .page-counter {
            text-align: center;
            font-size: 14px;
            color: #ccc;
        }

        .gauge-container {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 5px 0;
        }
        .page-gauge {
            width: 85%;
            margin: 0;
            cursor: pointer;
            accent-color: #e50914; 
        }

        /* 話ナビゲーション全体のレイアウト調整 */
        .story-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            width: 100%;
        }
        .story-nav a {
            color: #fff;
            text-decoration: none;
            background: #222;
            padding: 5px 15px;
            border-radius: 4px;
            border: 1px solid #444;
            white-space: nowrap;
        }
        .story-nav a.disabled {
            color: #555;
            border-color: #222;
            pointer-events: none;
        }

        /* 修正：全画面表示ボタンを下部中央に綺麗に収めるスタイル */
        .fullscreen-btn {
            color: #fff;
            font-size: 13px;
            background: #e50914; /* ブランドカラー等に合わせて変更してください */
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            border: none;
            font-family: sans-serif;
            white-space: nowrap;
            margin: 0 10px;
        }
    </style>
</head>
<body>

    <div class="tap-zone tap-left" id="zone-left"></div>
    <div class="tap-zone tap-center" id="zone-center"></div>
    <div class="tap-zone tap-right" id="zone-right"></div>

    <div class="menu-bar top-bar" id="top-bar">
        <a href="index.html" class="back-to-top">◀ TOPへ戻る</a>
        <div class="top-title" id="menu-title">第1話</div>
    </div>

    <div class="comic-viewer-wrapper">
        <div class="comic-viewer" id="viewer" dir="rtl"></div>
    </div>

    <div class="menu-bar bottom-bar" id="bottom-bar">
        <div class="page-counter"><span id="current-page">1</span> / <span id="total-page">54</span></div>
        
        <div class="gauge-container">
            <input type="range" id="page-gauge" class="page-gauge" min="1" max="54" value="1" step="1">
        </div>

        <div class="story-nav">
            <a href="#" id="link-next">◀ 次の話</a>
            <!-- 修正：全画面切り替えボタンを中央に配置 -->
            <button class="fullscreen-btn" id="fullscreen-btn">全画面表示</button>
            <a href="#" id="link-prev">前の話 ▶</a>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const storyFolder = urlParams.get('p') || 'story1';

        const storyNum = storyFolder.replace('story', '');
        document.getElementById('menu-title').innerText = `第${storyNum}話`;

        const pageCounts = {
            'story1': 54, 
            'story2': 22,  
            'story3': 34,  
            'story4': 44,  
            'story5': 48,  
            'story6': 50,  
            'story7': 26,  
            'story8': 30,  
            'story9': 26, 
            'story10': 60, 
            'story11': 32, 
            'story12': 34, 
        };
        const totalPages = pageCounts[storyFolder] || 54;

        document.getElementById('total-page').innerText = totalPages;
        const gauge = document.getElementById('page-gauge');
        gauge.max = totalPages;

        const currentNum = parseInt(storyNum, 10);
        const prevLink = document.getElementById('link-prev');
        const nextLink = document.getElementById('link-next');

        if (currentNum > 1) {
            prevLink.href = `?p=story${currentNum - 1}`;
        } else {
            prevLink.classList.add('disabled');
        }

        if (pageCounts[`story${currentNum + 1}`]) {
            nextLink.href = `?p=story${currentNum + 1}`;
        } else {
            nextLink.classList.add('disabled');
        }

        const githubBase = `https://kizukusan.github.io/moimon/${storyFolder}/`;
        const $viewer = $('#viewer');

        let currentOrientation = getOrientation();
        let currentPage = 1; 
        let isDragging = false;

        function getOrientation() {
            return window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
        }

        function pageToSlideIndex(page, orientation) {
            if (orientation === 'portrait') {
                return page - 1;
            } else {
                return page === 1 ? 0 : Math.floor(page / 2);
            }
        }

        function slideIndexToPage(slideIndex, orientation) {
            if (orientation === 'portrait') {
                return slideIndex + 1;
            } else {
                return slideIndex === 0 ? 1 : slideIndex * 2;
            }
        }

        function createSpreadSlide(rightPage, leftPage) {
            const slide = document.createElement('div');
            slide.className = 'slide-spread';

            const rightContainer = document.createElement('div');
            rightContainer.className = 'page-container right-side';
            if (rightPage) {
                const img = document.createElement('img');
                img.src = `${githubBase}${String(rightPage).padStart(2, '0')}.jpg`;
                rightContainer.appendChild(img);
            }
            slide.appendChild(rightContainer);

            const leftContainer = document.createElement('div');
            leftContainer.className = 'page-container left-side';
            if (leftPage) {
                const img = document.createElement('img');
                img.src = `${githubBase}${String(leftPage).padStart(2, '0')}.jpg`;
                leftContainer.appendChild(img);
            }
            slide.appendChild(leftContainer);

            return slide;
        }

        function buildDOM(orientation) {
            $viewer.empty();
            if (orientation === 'portrait') {
                for (let i = 1; i <= totalPages; i++) {
                    const pageNum = String(i).padStart(2, '0');
                    const img = document.createElement('img');
                    img.src = `${githubBase}${pageNum}.jpg`;
                    
                    const slide = document.createElement('div');
                    slide.appendChild(img);
                    $viewer.append(slide);
                }
            } else {
                $viewer.append(createSpreadSlide(1, null));

                for (let i = 2; i <= totalPages; i += 2) {
                    const rightPage = i;
                    const leftPage = (i + 1 <= totalPages) ? i + 1 : null;
                    $viewer.append(createSpreadSlide(rightPage, leftPage));
                }
            }
        }

        function updateUI() {
            if (currentOrientation === 'portrait') {
                document.getElementById('current-page').innerText = currentPage;
            } else {
                if (currentPage === 1) {
                    document.getElementById('current-page').innerText = '1';
                } else {
                    const nextPage = currentPage + 1;
                    if (nextPage > totalPages) {
                        document.getElementById('current-page').innerText = `${currentPage}`;
                    } else {
                        document.getElementById('current-page').innerText = `${currentPage}-${nextPage}`;
                    }
                }
            }

            if (!isDragging) {
                gauge.value = totalPages - currentPage + 1;
            }
        }

        function initSlick() {
            $viewer.slick({
                rtl: true,
                infinite: false,
                slidesToShow: 1,
                slidesToScroll: 1,
                arrows: false,
                swipe: true,
                touchMove: true
            });

            $viewer.off('afterChange').on('afterChange', function(event, slick, currentSlide){
                currentPage = slideIndexToPage(currentSlide, currentOrientation);
                updateUI();
            });

            $viewer.off('beforeChange').on('beforeChange', function(){
                if (!isDragging) {
                    $('#top-bar').removeClass('menu-active');
                    $('#bottom-bar').removeClass('menu-active');
                }
            });
        }

        function handleOrientationChange() {
            if ($viewer.hasClass('slick-initialized')) {
                $viewer.slick('unslick');
            }

            buildDOM(currentOrientation);
            initSlick();

            let targetSlide = pageToSlideIndex(currentPage, currentOrientation);
            $viewer.slick('slickGoTo', targetSlide, true);
            
            setTimeout(function() {
                $viewer.slick('setPosition');
                updateUI();
            }, 50);
        }

        $(document).ready(function(){
            buildDOM(currentOrientation);
            initSlick();
            updateUI();

            let resizeTimeout;
            $(window).on('resize', function() {
                clearTimeout(resizeTimeout);
                resizeTimeout = setTimeout(function() {
                    const newOrientation = getOrientation();
                    if (newOrientation !== currentOrientation) {
                        currentOrientation = newOrientation;
                        handleOrientationChange();
                    } else {
                        if ($viewer.hasClass('slick-initialized')) {
                            $viewer.slick('setPosition');
                        }
                    }
                }, 200);
            });

            $(gauge).on('mousedown touchstart', function() {
                isDragging = true;
            });

            $(gauge).on('input', function(){
                const uiValue = parseInt($(this).val(), 10);
                const calcPage = totalPages - uiValue + 1;

                if (currentOrientation === 'portrait') {
                    document.getElementById('current-page').innerText = calcPage;
                } else {
                    if (calcPage === 1) {
                        document.getElementById('current-page').innerText = '1';
                    } else {
                        const rightPage = calcPage % 2 === 0 ? calcPage : calcPage - 1;
                        const nextPage = rightPage + 1;
                        if (nextPage > totalPages) {
                            document.getElementById('current-page').innerText = `${rightPage}`;
                        } else {
                            document.getElementById('current-page').innerText = `${rightPage}-${nextPage}`;
                        }
                    }
                }
            });

            $(gauge).on('change mouseup touchend', function(){
                if (isDragging) {
                    isDragging = false;
                    const uiValue = parseInt($(this).val(), 10);
                    let calcPage = totalPages - uiValue + 1;

                    if (currentOrientation === 'landscape' && calcPage > 1 && calcPage % 2 !== 0) {
                        calcPage = calcPage - 1;
                    }

                    currentPage = calcPage;
                    const targetSlide = pageToSlideIndex(currentPage, currentOrientation);

                    $viewer.slick('slickGoTo', targetSlide, true);
                    updateUI();
                }
            });

            $('#zone-left').on('click', function(){
                $viewer.slick('slickNext'); 
            });

            $('#zone-right').on('click', function(){
                $viewer.slick('slickPrev'); 
            });

            $('#zone-center').on('click', function(){
                $('#top-bar').toggleClass('menu-active');
                $('#bottom-bar').toggleClass('menu-active');
            });

            // 全画面表示のコントロール処理
            const fsBtn = document.getElementById('fullscreen-btn');

            fsBtn.addEventListener('click', function(e) {
                e.stopPropagation(); // メニューが閉じてしまうのを防ぐ
                
                if (!document.fullscreenElement && 
                    !document.webkitFullscreenElement && 
                    !document.mozFullScreenElement && 
                    !document.msFullscreenElement) {
                    // 全画面開始処理
                    const docElm = document.documentElement;
                    if (docElm.requestFullscreen) {
                        docElm.requestFullscreen();
                    } else if (docElm.webkitRequestFullscreen) {
                        docElm.webkitRequestFullscreen();
                    } else if (docElm.mozRequestFullScreen) {
                        docElm.mozRequestFullScreen();
                    } else if (docElm.msRequestFullscreen) {
                        docElm.msRequestFullscreen();
                    }
                } else {
                    // 全画面解除処理（通常表示に戻る）
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.webkitExitFullscreen) {
                        document.webkitExitFullscreen();
                    } else if (document.mozCancelFullScreen) {
                        document.mozCancelFullScreen();
                    } else if (document.msExitFullscreen) {
                        document.msExitFullscreen();
                    }
                }
            });

            // 全画面の状態変化を検知してボタンの文字を切り替え
            function onFullscreenChange() {
                if (document.fullscreenElement || document.webkitFullscreenElement) {
                    fsBtn.innerText = "通常表示に戻る";
                } else {
                    fsBtn.innerText = "全画面表示";
                }
                setTimeout(function() {
                    if ($viewer.hasClass('slick-initialized')) {
                        $viewer.slick('setPosition');
                    }
                }, 150);
            }

            document.addEventListener('fullscreenchange', onFullscreenChange);
            document.addEventListener('webkitfullscreenchange', onFullscreenChange);
            document.addEventListener('mozfullscreenchange', onFullscreenChange);
            document.addEventListener('MSFullscreenChange', onFullscreenChange);
        });
    </script>

</body>
</html>
